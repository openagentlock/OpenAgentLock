# Default policy — five baseline gates in monitor mode.
# See docs/POLICY.md for the schema.
#
# Top-level mode = monitor. Every matched rule logs `match:monitor`
# and the verdict is forced to `allow`; nothing is blocked. Flip
# individual rules (or the whole policy) to enforce once you've
# reviewed the activity log in the dashboard.

version: 1
mode: monitor
session_ttl: 8h

defaults:
  bash: allow
  read: allow
  write: allow

gates:
  - id: supply-chain.pkg-install
    severity: high
    match:
      tool: Bash
      command_regex: '^(pip|pip3|npm|pnpm|yarn|brew|cargo|gem) (install|add|-i)\b'
    evaluate:
      - kind: typosquat
        reference: __INLINE__:numpy,pandas,requests,flask,django,fastapi,pytest,pip,setuptools,wheel,react,vue,express,lodash,axios,typescript,eslint,prettier,jest,vite,git,node,python,go,rust,docker,kubectl
        action_on_near_miss: deny
      - kind: allowlist
        list: __INLINE__:numpy,pandas,requests,flask,django,fastapi,pytest,pip,setuptools,wheel,react,vue,express,lodash,axios,typescript,eslint,prettier,jest,vite,git,node,python,go,rust,docker,kubectl
        on_hit: allow
        on_miss: deny

  - id: supply-chain.untrusted-mcp
    match:
      any_of:
        - { tool_prefix: "mcp__" }
        - { tool: mcp.before_execution }
    evaluate:
      - kind: pin-tofu
        store: $AGENTLOCK_HOME/pinned-mcp.json
        on_known: allow
        on_unknown: deny
        on_changed: deny

  - id: rogue.secret-read
    severity: high
    match:
      any_of:
        - { tool: Read, path_glob: "**/.env*" }
        - { tool: Read, path_glob: "**/.ssh/**" }
        - { tool: Read, path_glob: "**/.aws/**" }
        - { tool: Bash, command_regex: '(\.env(\b|[._-])|/\.ssh(/|\b)|/\.aws(/|\b)|credentials)' }
    evaluate:
      - kind: always
        action: deny

  - id: rogue.net-egress
    match:
      any_of:
        - { tool: Bash, command_regex: '\b(curl|wget|nc|netcat)\b' }
        - { tool: mcp.http.request }
    evaluate:
      - kind: host-allowlist
        list: __INLINE__:github.com,raw.githubusercontent.com,api.github.com,registry.npmjs.org,pypi.org,files.pythonhosted.org,crates.io,static.crates.io,rubygems.org,pkg.go.dev,proxy.golang.org,sum.golang.org
        on_hit: allow
        on_miss: deny

  - id: rogue.destructive-bash
    severity: critical
    match:
      tool: Bash
      any_command_regex:
        - 'rm\s+(-[rRfF]+\s+)+\S+'
        - 'git\s+push\s+.*--force'
        - 'kubectl\s+delete\s+'
        - 'DROP\s+(TABLE|DATABASE|SCHEMA)'
        - 'chmod\s+-R\b'
    evaluate:
      - kind: always
        action: deny
        require_rotate: true
