name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user-facing problem does this solve?
    validations: { required: true }

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Sketch the solution. Include CLI surface, config knobs, or API shape if relevant.
    validations: { required: true }

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: context
    attributes:
      label: Additional context
