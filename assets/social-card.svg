<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="OpenAgentLock — A firewall for AI coding agents">
  <title>OpenAgentLock — A firewall for AI coding agents</title>
  <rect width="1200" height="630" fill="#ffffff"/>
  <!-- subtle grid -->
  <g opacity="0.06" stroke="#000" stroke-width="1">
    <path d="M0 100 H1200 M0 200 H1200 M0 300 H1200 M0 400 H1200 M0 500 H1200"/>
    <path d="M100 0 V630 M200 0 V630 M300 0 V630 M400 0 V630 M500 0 V630 M600 0 V630 M700 0 V630 M800 0 V630 M900 0 V630 M1000 0 V630 M1100 0 V630"/>
  </g>

  <!-- mark, large -->
  <g transform="translate(80 175) scale(4.5)">
    <path d="M32 4 L56 12 V30 C56 44 46 54 32 60 C18 54 8 44 8 30 V12 Z"
          fill="none" stroke="#000" stroke-width="3" stroke-linejoin="round"/>
    <rect x="22" y="30" width="20" height="16" rx="2" fill="#000"/>
    <path d="M26 30 V25 a6 6 0 0 1 12 0 V30"
          fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>
    <circle cx="32" cy="36" r="2.4" fill="#fff"/>
    <rect x="31" y="36" width="2" height="6" fill="#fff"/>
    <circle cx="14" cy="20" r="2" fill="#000"/>
    <circle cx="50" cy="20" r="2" fill="#000"/>
    <circle cx="32" cy="14" r="2" fill="#000"/>
    <line x1="14" y1="20" x2="32" y2="14" stroke="#000" stroke-width="1.2"/>
    <line x1="50" y1="20" x2="32" y2="14" stroke="#000" stroke-width="1.2"/>
    <line x1="14" y1="20" x2="50" y2="20" stroke="#000" stroke-width="1.2" stroke-dasharray="2 2"/>
  </g>

  <!-- wordmark + tagline -->
  <g transform="translate(450 250)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#000">
    <text font-size="84" font-weight="700" letter-spacing="-1.5">
      <tspan>Open</tspan><tspan font-weight="400">Agent</tspan><tspan>Lock</tspan>
    </text>
    <text y="80" font-size="36" font-weight="400" fill="#444">A firewall for AI coding agents.</text>
    <text y="140" font-size="22" font-weight="400" fill="#666">Detect harnesses · Gate risky tool calls · Sign every decision.</text>
  </g>

  <!-- footer pill -->
  <g transform="translate(80 540)">
    <rect width="380" height="44" rx="22" fill="#000"/>
    <text x="20" y="29" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#fff" font-weight="600">github.com/openagentlock/openagentlock</text>
  </g>
</svg>
