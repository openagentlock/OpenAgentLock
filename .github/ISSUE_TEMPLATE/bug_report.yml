name: Bug report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file an issue.

        **Do not file security vulnerabilities here.** See `SECURITY.md` for the disclosure address.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations: { required: true }

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations: { required: true }

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations: { required: true }

  - type: input
    id: agentlock-version
    attributes:
      label: agentlock version
      description: Output of `agentlock --version`
    validations: { required: true }

  - type: input
    id: control-plane-version
    attributes:
      label: control-plane image tag
      description: e.g. `ghcr.io/openagentlock/control-plane:0.1.0` or `:latest`
    validations: { required: true }

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows (native)
        - Windows (WSL2)
    validations: { required: true }

  - type: dropdown
    id: harness
    attributes:
      label: Affected harness
      options:
        - Claude Code
        - Codex CLI
        - Cursor
        - OpenCode
        - Cline
        - Gemini CLI
        - Continue.dev
        - Copilot
        - None / multiple
    validations: { required: true }

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant log output. Redact secrets.
      render: shell
