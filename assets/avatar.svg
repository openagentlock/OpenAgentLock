<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="OpenAgentLock">
  <title>OpenAgentLock</title>

  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%"  stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
  </defs>

  <!-- background tile, slightly rounded so platforms that crop to a circle still look balanced -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- centered shield + lock + agent constellation -->
  <g transform="translate(128 128) scale(3.0) translate(-32 -32)" stroke-linejoin="round" stroke-linecap="round">
    <!-- agent constellation behind shield -->
    <circle cx="14" cy="20" r="2.4" fill="#fff" opacity="0.6"/>
    <circle cx="50" cy="20" r="2.4" fill="#fff" opacity="0.6"/>
    <circle cx="32" cy="10" r="2.4" fill="#fff" opacity="0.6"/>
    <line x1="14" y1="20" x2="32" y2="10" stroke="#fff" stroke-width="0.9" opacity="0.4"/>
    <line x1="50" y1="20" x2="32" y2="10" stroke="#fff" stroke-width="0.9" opacity="0.4"/>
    <line x1="14" y1="20" x2="50" y2="20" stroke="#fff" stroke-width="0.9" opacity="0.4" stroke-dasharray="2 2"/>

    <!-- shield -->
    <path d="M32 4 L56 12 V30 C56 44 46 54 32 60 C18 54 8 44 8 30 V12 Z"
          fill="none" stroke="#fff" stroke-width="2.6"/>

    <!-- padlock body -->
    <rect x="22" y="30" width="20" height="16" rx="2" fill="#fff"/>
    <!-- shackle -->
    <path d="M26 30 V25 a6 6 0 0 1 12 0 V30"
          fill="none" stroke="#fff" stroke-width="2.6"/>
    <!-- keyhole punched into the lock -->
    <circle cx="32" cy="36" r="2.6" fill="#000"/>
    <rect x="31" y="36" width="2" height="6" fill="#000"/>
  </g>
</svg>
