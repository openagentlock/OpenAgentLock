services:
  control-plane:
    build: .
    image: agentlockd:dev
    ports:
      - "127.0.0.1:7878:7878"
    environment:
      AGENTLOCK_LISTEN: "0.0.0.0:7878"
    volumes:
      - ../dev/agentlock:/var/lib/agentlock
    healthcheck:
      test: ["CMD", "/usr/local/bin/agentlockd", "--health"]
      interval: 10s
      timeout: 2s
      retries: 3
