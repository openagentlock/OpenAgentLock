name: pages

on:
  # Pages requires the GitHub Pages site to be enabled on the repo. On
  # private repos with the free plan, that needs a paid plan or a
  # public-visibility flip. Until then this workflow is manual-only.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: build & deploy MkDocs site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install MkDocs Material
        run: pip install -r docs/requirements.txt

      - name: Build site
        run: mkdocs build --clean --strict

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
